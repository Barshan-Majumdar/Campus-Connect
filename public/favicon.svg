<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="100%" stop-color="#0c1225"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00b4ff"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <rect x="2" y="2" width="44" height="44" rx="8" fill="none" stroke="url(#glow)" stroke-width="1.2" opacity="0.5"/>
  <!-- Grid lines (subtle background texture) -->
  <g opacity="0.12" stroke="#00b4ff" stroke-width="0.4">
    <line x1="12" y1="2" x2="12" y2="46"/>
    <line x1="24" y1="2" x2="24" y2="46"/>
    <line x1="36" y1="2" x2="36" y2="46"/>
    <line x1="2" y1="12" x2="46" y2="12"/>
    <line x1="2" y1="24" x2="46" y2="24"/>
    <line x1="2" y1="36" x2="46" y2="36"/>
  </g>
  <!-- Glow behind text -->
  <text x="24" y="33" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="url(#glow)" filter="url(#blur)" opacity="0.5">CC</text>
  <!-- Main "CC" text -->
  <text x="24" y="33" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="url(#glow)">CC</text>
  <!-- Small dots at grid intersections -->
  <g fill="#00b4ff" opacity="0.35">
    <circle cx="12" cy="12" r="1"/>
    <circle cx="24" cy="12" r="1"/>
    <circle cx="36" cy="12" r="1"/>
    <circle cx="12" cy="24" r="1"/>
    <circle cx="36" cy="24" r="1"/>
    <circle cx="12" cy="36" r="1"/>
    <circle cx="24" cy="36" r="1"/>
    <circle cx="36" cy="36" r="1"/>
  </g>
</svg>